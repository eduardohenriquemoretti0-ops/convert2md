name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: System deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential git autoconf libtool pkg-config cmake ccache \
            libncurses-dev zlib1g-dev libffi-dev libssl-dev \
            openjdk-17-jdk unzip zip

      - name: Python deps
        run: pip install buildozer cython kivy

      - name: Cache SDK/NDK/build
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer/android/platform/android-sdk
            .buildozer/android/platform/android-ndk-r25b
          key: buildozer-${{ hashFiles('buildozer.spec') }}-v1
          restore-keys: buildozer-

      - name: Build APK
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          PIP_BREAK_SYSTEM_PACKAGES: "1"
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: convert2md-debug
          path: bin/*.apk
          retention-days: 30
